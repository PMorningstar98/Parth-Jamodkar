name: Update Medium posts

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-medium
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch new Medium posts
        run: node scripts/update-medium.mjs

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain data/content.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/content.json
            git commit -m "chore: sync new Medium blog posts [skip ci]"
            git push
          else
            echo "No content changes to commit."
          fi
